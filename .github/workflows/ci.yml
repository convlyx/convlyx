name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a new commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + type-check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Postgres service container for the integration tests. Migrations apply
    # cleanly to it on every run, so tests get a fresh schema each time.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Pointed at the service container above. The `?schema=public` is
      # required for Prisma's Postgres adapter.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
      # Module-load-time placeholders. The Supabase admin client is
      # constructed when user.ts is imported and throws on undefined URL;
      # actual auth API calls are inside try/catch and tolerate bad creds.
      # Tests don't authenticate — they use tRPC's createCallerFactory with
      # synthetic contexts — so real values aren't required.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test
