name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a new commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client lives in src/generated/prisma (gitignored), so lint
      # and type-check both need it generated before they run. `prisma generate`
      # never connects to the DB but prisma.config.ts requires DATABASE_URL
      # to resolve at config-load time — feed it a dummy URL.
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check
